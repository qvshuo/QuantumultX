name: Sync

on:
  schedule:
    - cron: '30 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download spotify.conf
        run: curl -fsSL https://raw.githubusercontent.com/app2smile/rules/master/module/spotify.conf -o spotify.conf

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify.conf
          git diff --cached --quiet || (git commit -m "chore: sync spotify.conf" && git pull --rebase && git push)
