name: AdGuard DNS Filter for Quantumult X

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download, Convert & Header
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          SOURCE_URL="https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"
          
          curl -fsSL "$SOURCE_URL" \
          | grep '^||.*\^$' \
          | sed 's/^||//; s/\^$//' \
          | grep -E '^[a-zA-Z0-9.-]+$' \
          | sed 's/$/,reject/; s/^/DOMAIN-SUFFIX,/' \
          | sort -u \
          > body.txt

          {
            echo "# AdGuard DNS Filter for Quantumult X"
            echo "# Update: $NOW (UTC+8)"
            echo "# Source: $SOURCE_URL"
            echo "# Total Rules: $(wc -l < body.txt)"
            cat body.txt
          } > AdGuardDNSfilter.list
          
          rm body.txt

      - name: Commit and Push
        run: |
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add AdGuardDNSfilter.list
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly update adguard dns filter rules $NOW (UTC+8)"
            git push
          else
            echo "No changes detected, skipping push."
          fi
